apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-redis
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-redis
  template:
    metadata:
      labels:
        app: immich-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: immich-redis
  namespace: media
spec:
  selector:
    app: immich-redis
  ports:
    - port: 6379