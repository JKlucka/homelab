apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://immich-app.github.io/immich-charts
    chart: immich
    targetRevision: 0.11.1
    helm:
      values: |
        immich:
          metrics:
            enabled: false
          persistence:
            library:
              existingClaim: immich-library-pvc

        valkey:
          enabled: false

        server:
          controllers:
            main:
              containers:
                main:
                  image:
                    tag: v2.7.5
                  envFrom:
                    - secretRef:
                        name: immich-secrets

        machine-learning:
          enabled: true
          controllers:
            main:
              containers:
                main:
                  image:
                    tag: v2.7.5
          persistence:
            cache:
              enabled: true
              size: 10Gi
              type: emptyDir
              accessMode: ReadWriteMany

  destination:
    server: https://kubernetes.default.svc
    namespace: media
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true