apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://helm.traefik.io/traefik
    chart: traefik
    targetRevision: 26.1.0
    helm:
      values: |
        deployment:
          replicas: 1
        service:
          type: LoadBalancer
          annotations:
            metallb.universe.tf/ip-allocated-from-pool: homelab-pool
            metallb.universe.tf/allow-shared-ip: traefik
        loadBalancerIP: 192.168.0.200
        ports:
          web:
            port: 8000
            exposedPort: 80
            redirectTo:
              port: websecure
          websecure:
            port: 8443
            exposedPort: 443
        logs:
          general:
            level: INFO
        providers:
          kubernetesCRD:
            enabled: true
          kubernetesIngress:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: networking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true