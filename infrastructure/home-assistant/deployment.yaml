apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-auto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:stable
          ports:
            - containerPort: 8123
          volumeMounts:
            - name: config
              mountPath: /config
          env:
            - name: TZ
              value: Europe/Prague
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config