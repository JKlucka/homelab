apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: immich
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`photos.jklu-lab.eu`)
      kind: Rule
      services:
        - name: immich-server
          port: 2283
          responseForwarding:
            flushInterval: 1ms
  tls: {}