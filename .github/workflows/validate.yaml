name: Validate Manifests

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint ArgoCD Applications
        run: |
          for app in apps/*.yaml; do
            echo "Checking $app..."
            helm lint "$app" 2>/dev/null || true
          done

  kubectl-validate:
    name: Kubectl Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests
        run: |
          find infrastructure -name "*.yaml" | while read f; do
            echo "Validating $f..."
            kubectl apply --dry-run=client -f "$f" 2>&1 || true
          done

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint -c .yamllint.yaml apps/ infrastructure/
